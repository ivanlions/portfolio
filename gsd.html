<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep EXP Simulator</title>

<style>
body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
label { display: block; margin-top: 12px; }

table {
  margin-top: 20px;
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

th { background: #f0f0f0; }

.gsdCount {
  color: blue;
  font-size: 0.9em;
  margin-top: 4px;
}
</style>
</head>

<body>

<h2>Pokémon Good Sleep Day EXP Simulator</h2>

<label>
Target sleeps:
<input id="target" type="number" value="100">
</label>

<label>
Start date:
<input id="start" type="date">
</label>

<label>
<input id="showGSD" type="checkbox">
Show GSD counts
</label>

<label>
<input id="showEnd" type="checkbox">
Show end date
</label>

<h3>Days Needed</h3>

<table>
<thead>
<tr>
<th>Incense</th>
<th>Normal</th>
<th>Whale</th>
</tr>
</thead>
<tbody id="results">
<tr><td colspan="3">Loading...</td></tr>
</tbody>
</table>

<script>
let BASE_GSD = {};
let loaded = false;


// ---------- Date helpers ----------
function parseLocalDate(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}

function formatLocalDate(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,'0') + "-" +
    String(d.getDate()).padStart(2,'0');
}


// ---------- Load calendar ----------
fetch("misc/gsd_calendar.json")
  .then(r => r.json())
  .then(data => {
    BASE_GSD = data;
    loaded = true;
    update();
  });


// ---------- Build calendar ----------
function buildCalendar(startDate, months, incenseMode) {
  const cal = {};
  const end = new Date(startDate);
  end.setMonth(end.getMonth() + months);

  for (const [dateStr, baseMult] of Object.entries(BASE_GSD)) {
    const d = parseLocalDate(dateStr);
    if (d < startDate || d > end) continue;

    let mult = baseMult;

    if (incenseMode === "middle" && baseMult === 3)
      mult = 6;

    if (incenseMode === "all")
      mult = baseMult * 2;

    cal[dateStr] = mult;
  }

  return cal;
}


// ---------- Simulation ----------
function simulate(target, startDate, incenseMode, whale) {
  const gsd = buildCalendar(startDate, 24, incenseMode);

  let total = 0;
  let sleeps = 0;

  let count4 = 0;
  let count6 = 0;

  let d = new Date(startDate);

  while (total < target) {
    const key = formatLocalDate(d);
    let mult = gsd[key] || 1;

    if (mult === 4) count4++;
    if (mult === 6) count6++;

    if (whale && mult === 1)
      mult = 2;

    total += mult;
    sleeps++;
    d.setDate(d.getDate() + 1);
  }

  return {
    sleeps,
    count4,
    count6,
    endDate: new Date(d)
  };
}


// ---------- Unified table update ----------
function update() {

  if (!loaded) return;

  const target = Number(document.getElementById("target").value);
  const startStr = document.getElementById("start").value;
  const showGSD = document.getElementById("showGSD").checked;
  const showEnd = document.getElementById("showEnd").checked;

  if (!startStr || target <= 0) return;

  const startDate = parseLocalDate(startStr);

  const modes = ["none","middle","all"];
  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  for (const mode of modes) {

    const normal = simulate(target, startDate, mode, false);
    const whale  = simulate(target, startDate, mode, true);

    function cell(res) {

      let html = `${res.sleeps}`;

      if (showEnd) {
        html += `<div style="color:#666;font-size:0.9em;">
          ${formatLocalDate(res.endDate)}
        </div>`;
      }

      if (showGSD) {
        html += `<div class="gsdCount">
          4×: ${res.count4}<br>
          6×: ${res.count6}
        </div>`;
      }

      return html;
    }

    tbody.innerHTML += `
      <tr>
        <td>${mode}</td>
        <td>${cell(normal)}</td>
        <td>${cell(whale)}</td>
      </tr>
    `;
  }
}


// ---------- Reactive inputs ----------
document.getElementById("target").addEventListener("input", update);
document.getElementById("start").addEventListener("input", update);
document.getElementById("showGSD").addEventListener("change", update);
document.getElementById("showEnd").addEventListener("change", update);

// Default start date = today
document.getElementById("start").value =
  formatLocalDate(new Date());

</script>
</body>
</html>
