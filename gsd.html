<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GSD EXP Simulator</title>

<style>
body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
label { display: block; margin-top: 12px; }

table {
  margin-top: 20px;
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

th { background: #f0f0f0; }

.gsdCount {
  color: blue;
  font-size: 0.9em;
  margin-top: 4px;
}
</style>
</head>

<body>

<h2>Pokémon Good Sleep Day EXP Simulator</h2>

<label>
Target sleeps:
<input id="target" type="number" value="100">
</label>

<label>
Start date:
<input id="start" type="date">
</label>

<label>
Sleep EXP Bonus Pokémon:
<select id="bonusN">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>
</label>

<label>
<input id="bonusGSDOnly" type="checkbox">
Apply bonus only on GSD days
</label>

<label>
<input id="showGSD" type="checkbox">
Show GSD counts
</label>

<label>
<input id="showEnd" type="checkbox">
Show end date
</label>

<label>
<input id="showWork" type="checkbox">
Show work (debug)
</label>

<div id="debugControls" style="display:none; margin-left:20px;">

<label>
Debug incense:
<select id="debugMode">
<option value="none">none</option>
<option value="middle">middle</option>
<option value="all">all</option>
</select>
</label>

<label>
Debug type:
<select id="debugWhale">
<option value="normal">normal</option>
<option value="whale">whale</option>
</select>
</label>

</div>



<h3>Days Needed</h3>

<table>
<thead>
<tr>
<th>Incense</th>
<th>Normal</th>
<th>Whale</th>
</tr>
</thead>
<tbody id="results">
<tr><td colspan="3">Loading...</td></tr>
</tbody>
</table>

<pre id="debugBox" style="
  margin-top:20px;
  background:#f7f7f7;
  padding:10px;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  font-size:12px;
"></pre>

<script>
let BASE_GSD = {};
let loaded = false;


// ---------- Date helpers ----------
function parseLocalDate(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}

function formatLocalDate(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,'0') + "-" +
    String(d.getDate()).padStart(2,'0');
}


// ---------- Load calendar ----------
fetch("misc/gsd_calendar.json")
  .then(r => r.json())
  .then(data => {
    BASE_GSD = data;
    loaded = true;
    update();
  });


// ---------- Build calendar ----------
function buildCalendar(startDate, months, incenseMode) {
  const cal = {};
  const end = new Date(startDate);
  end.setMonth(end.getMonth() + months);

  for (const [dateStr, baseMult] of Object.entries(BASE_GSD)) {
    const d = parseLocalDate(dateStr);
    if (d < startDate || d > end) continue;

    let mult = baseMult;

    if (incenseMode === "middle" && baseMult === 3)
      mult = 6;

    if (incenseMode === "all")
      mult = baseMult * 2;

    cal[dateStr] = mult;
  }

  return cal;
}


// ---------- Simulation ----------
function simulate(
  target,startDate,incenseMode,whale,
  bonusN,bonusGSDOnly,collectDebug=false
) {

  const gsd = buildCalendar(startDate,24,incenseMode);

  let total=0,sleeps=0,count4=0,count6=0;
  const bonusFactor = 1+0.14*bonusN;
  let debugLog=[];
  let d=new Date(startDate);

  while(total<target){

    const key=formatLocalDate(d);
    let baseMult=gsd[key]||1;

    if(baseMult===4) count4++;
    if(baseMult===6) count6++;

    let whaleApplied=false;
    if(whale && baseMult===1){
      baseMult=2;
      whaleApplied=true;
    }

    let finalMult=baseMult;
    let bonusApplied=false;

    if(bonusN>0 && (!bonusGSDOnly || baseMult>1)){
      finalMult=baseMult*bonusFactor;
      bonusApplied=true;
    }

    total+=finalMult;
    sleeps++;

    if(collectDebug){
      debugLog.push(
        `${key} | base=${baseMult}`
        +(whaleApplied?" (whale)":"")
        +(bonusApplied?` ×${bonusFactor.toFixed(2)}`:"")
        +` → +${finalMult.toFixed(2)} (total=${total.toFixed(2)})`
      );
    }

    d.setDate(d.getDate()+1);
  }

  return {sleeps,count4,count6,endDate:new Date(d),debugLog};
}


// ---------- Unified update ----------
function update(){

  if(!loaded) return;

  const target=+targetInput.value;
  const startStr=startInput.value;
  if(!startStr||target<=0) return;

  const startDate=parseLocalDate(startStr);

  const showGSD=showGSDInput.checked;
  const showEnd=showEndInput.checked;
  const showWork=showWorkInput.checked;

  const bonusN=+bonusNInput.value;
  const bonusGSDOnly=bonusGSDOnlyInput.checked;

  const modes=["none","middle","all"];
  results.innerHTML="";

  // ---------- table ----------
  for(const mode of modes){

    const normal=simulate(target,startDate,mode,false,bonusN,bonusGSDOnly);
    const whale=simulate(target,startDate,mode,true,bonusN,bonusGSDOnly);

    function cell(res){
      let html=`${res.sleeps}`;

      if(showEnd)
        html+=`<div style="color:#666;font-size:0.9em;">
          ${formatLocalDate(res.endDate)}</div>`;

      if(showGSD)
        html+=`<div class="gsdCount">
          4×:${res.count4}<br>6×:${res.count6}</div>`;

      return html;
    }

    results.innerHTML+=`
      <tr>
        <td>${mode}</td>
        <td>${cell(normal)}</td>
        <td>${cell(whale)}</td>
      </tr>`;
  }


  // ---------- debug ----------
  debugControls.style.display = showWork ? "block" : "none";
  debugBox.style.display = showWork ? "block" : "none";
  debugBox.textContent = "";

  if(showWork){

    const dbgMode=debugMode.value;
    const dbgWhale=debugWhale.value==="whale";

    const dbg=simulate(
      target,startDate,dbgMode,dbgWhale,
      bonusN,bonusGSDOnly,true
    );

    debugBox.textContent=
      `${dbgMode}, ${dbgWhale?"whale":"normal"}\n\n`
      +dbg.debugLog.join("\n");
  }
}


// ---------- Inputs ----------
const targetInput=target;
const startInput=start;
const showGSDInput=showGSD;
const showEndInput=showEnd;
const showWorkInput=showWork;

const bonusNInput=bonusN;
const bonusGSDOnlyInput=bonusGSDOnly;

const debugControls=document.getElementById("debugControls");
const debugMode=document.getElementById("debugMode");
const debugWhale=document.getElementById("debugWhale");

const results=document.getElementById("results");
const debugBox=document.getElementById("debugBox");

[
 targetInput,startInput,showGSDInput,showEndInput,
 showWorkInput,bonusNInput,bonusGSDOnlyInput,
 debugMode,debugWhale
].forEach(el=>el.addEventListener("input",update));

startInput.value=formatLocalDate(new Date());

</script>
</body>
</html>
